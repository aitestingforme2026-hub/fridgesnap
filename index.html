<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeSnap - מתכונים מהמקרר</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; color: #333; }
        .container { max-width: 600px; background: white; margin: 30px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; margin-bottom: 25px; }
        .upload-btn { background-color: #2ecc71; color: white; padding: 12px 24px; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; transition: background 0.3s; font-weight: bold; }
        .upload-btn:hover { background-color: #27ae60; }
        #imageInput { display: none; }
        #preview { max-width: 100%; max-height: 300px; margin: 20px auto; display: none; border-radius: 10px; border: 2px dashed #ddd; }
        #loading { display: none; margin: 20px; font-weight: bold; color: #e67e22; }
        #result { text-align: right; margin-top: 30px; padding: 20px; background: #fafafa; border-right: 5px solid #2ecc71; border-radius: 4px; display: none; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 FridgeSnap</h1>
        <p>צלמו או העלו תמונה של המקרר שלכם, וקבלו רעיונות למתכונים בשניות!</p>
        
        <button class="upload-btn" onclick="document.getElementById('imageInput').click()">📷 העלו תמונת מקרר</button>
        <input type="file" id="imageInput" accept="image/*" onchange="previewAndProcessImage(event)">
        
        <img id="preview" alt="תצוגה מקדימה">
        <div id="loading">⏳ השפים הווירטואליים חושבים על מתכונים...</div>
        <div id="result"></div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:5000' : '';

        function previewAndProcessImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const preview = document.getElementById('preview');
            const reader = new FileReader();
            
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                sendImageToBackend(e.target.result);
            }
            reader.readAsDataURL(file);
        }

        async function sendImageToBackend(base64Image) {
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            
            loading.style.display = 'block';
            resultDiv.style.display = 'none';
            resultDiv.innerHTML = '';

            try {
                const targetUrl = API_URL || 'https://' + window.location.hostname.replace('vercel.app', 'onrender.com') + '/api/recipe';
                
                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                loading.style.display = 'none';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = data.recipe.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            } catch (error) {
                console.error(error);
                loading.style.display = 'none';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '❌ אופס! משהו השתבש בתקשורת עם השף. ודאו שהשרת ב-Render פעיל.';
            }
        }
    </script>
</body>
</html>
